# Board: nice_nano_v2
# ======================================================
# ======================================================
# BASIC
# ======================================================
CONFIG_ZMK_KEYBOARD_NAME="zmk-corne-oled"

# ======================================================
# ZMK SETTINGS
# ======================================================
CONFIG_ZMK_SLEEP=y
# 5 minutes to led sleep (saving battery)
CONFIG_ZMK_IDLE_TIMEOUT=300000
# 60 minutes to deep sleep (saving battery)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000  

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# ======================================================
# BATTERY
# ======================================================
# Battery report interval in seconds (1 hour)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=3600

# ======================================================
# DISPLAY
# ======================================================
# Ensure full display visibility and proper initialization
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y

CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# nice_oled widgets (safe)
CONFIG_NICE_OLED_WIDGET_WPM=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=n

# ======================================================
# BLUETOOTH
# ======================================================
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# ======================================================
# MOUSE
# ======================================================
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y